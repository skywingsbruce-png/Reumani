[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
# 默认：跑 unit + integration；跳过 optional_large_data（需本地大数据/模型）。
# 本地想跑大数据测试：pytest -m optional_large_data
addopts = -m "not optional_large_data and not shadow_real_integration" -q
markers =
    unit: 纯逻辑，不依赖 data_lake / 模型 / API（CI 默认跑）
    integration: 多模块协作，用最小 fixture，仍不碰真实 data_lake / API（CI 默认跑）
    optional_large_data: 需本地 data_lake / 向量索引 / 大模型（默认跳过）
    shadow_real_integration: 手动真实试运行(可能联网 Europe PMC，默认不调付费模型；CI 默认跳过)
