name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: unit+integration (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install CI deps (lightweight, no big data / no API)
        run: python -m pip install --upgrade pip && pip install -r requirements-ci.txt
      - name: Run unit + integration tests
        # 无 API key、无 data_lake：默认 addopts 已跳过 optional_large_data
        run: pytest
